name: deploy-to-s3
on:
  push:
    branches:
      - main

env:
  AWS_REGION: "sa-east-1"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Git clone the repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build assets (minify into dist/)
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: arn:aws:iam::464340136449:role/GithubActions-DeployPersonalWebsite
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      # Deploy ONLY the compiled output. Source and tooling (web/js sources,
      # build.mjs, package*.json, node_modules) never reach the bucket because
      # they have no path into dist/.
      # Keep --exclude "assets/*": with --delete it stops the sync from pruning
      # the S3 assets/ prefix (images + audio published via sync-assets.sh).
      - name: Deploy static site to S3 bucket
        run: aws s3 sync ./dist s3://www.ericktakeshi.com.br --delete --exclude "assets/*"

      - name: Purge Cloudflare cache
        run: |
          resp=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | grep -q '"success":true' || { echo "Cloudflare purge failed"; exit 1; }
